<!--
  SNIPPET NAME: "footer"  (a.k.a. site-footer)
  =============================================
  What it is:
    The full site footer — logo + tagline, policy/page links, an email
    subscribe form, social icons, payment-method icon row, and a copyright/
    legal line. Identical across every page.

  Used on:
    - Every page (index.html, sports.html, contact.html, order.html, etc.)

  Requires (already in shared style.css):
    .footer, .footer-inner, .footer-brand, .logo-footer, .footer-tagline,
    .footer-links, .footer-mid-row, .footer-subscribe, .footer-email-form,
    .footer-social, .footer-payments, .payment-icon, .footer-legal

  Requires (JS): none required for the static markup. The subscribe form's
    onsubmit="return false;" is a placeholder — wire it to the client's
    email-marketing platform (Klaviyo, Mailchimp, etc.) when launching.

  Placeholders to swap when reusing for a NEW CLIENT SITE:
    - Logo + tagline: swap image src/alt and the one-line brand tagline
    - Policy links: relabel/re-target for whatever legal pages the client
      site actually has (remove any that don't apply — e.g. no Returns/
      Shipping for a service business)
    - Social links: update hrefs to the client's real profiles, remove any
      platforms they're not on (each <a> is self-contained, safe to delete)
    - Payment icons: REMOVE THIS ENTIRE BLOCK for non-ecommerce client sites
      (it's only relevant to stores that take card payments directly)
    - Copyright line: update business name + mailing address (and the year —
      consider templating this with JS: `new Date().getFullYear()`)
-->

<footer class="footer">
  <div class="container footer-inner">

    <!-- Logo + tagline -->
    <div class="footer-brand">
      <img src="assets/images/logos/REPLACE-WITH-CLIENT-LOGO.svg" alt="[Client Name] — [one-line description]" class="logo-footer"/>
      <p class="footer-tagline">[Client's one-line brand tagline goes here]</p>
    </div>

    <!-- Policy / page links — remove any that don't apply to this client -->
    <nav class="footer-links">
      <a href="privacy-policy.html">Privacy</a>
      <a href="return-policy.html">Returns</a>
      <a href="shipping-policy.html">Shipping</a>
      <a href="contact.html">Contact</a>
    </nav>

    <!-- Subscribe + Social row -->
    <div class="footer-mid-row">
      <div class="footer-subscribe">
        <p class="footer-subscribe-label">Subscribe to our emails</p>
        <!-- Wire onsubmit to the client's email platform before launch -->
        <form class="footer-email-form" onsubmit="return false;">
          <input type="email" placeholder="Email" class="footer-email-input"/>
          <button type="submit" class="footer-email-btn" aria-label="Subscribe">&#8594;</button>
        </form>
      </div>
      <div class="footer-social">
        <!-- Each icon is self-contained — delete any platform the client isn't on -->
        <a href="https://facebook.com/REPLACE" target="_blank" aria-label="Facebook">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </a>
        <a href="https://instagram.com/REPLACE" target="_blank" aria-label="Instagram">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </a>
        <a href="https://pinterest.com/REPLACE" target="_blank" aria-label="Pinterest">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
        </a>
      </div>
    </div>

    <!-- Payment icons — DELETE this whole block for non-ecommerce clients -->
    <div class="footer-payments">
      <svg class="payment-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="American Express"><rect width="38" height="24" rx="4" fill="#2E77BC"/><text x="19" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="white" letter-spacing="0.5">AMEX</text></svg>
      <svg class="payment-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apple Pay"><rect width="38" height="24" rx="4" fill="#000"/><text x="19" y="15.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="7.5" font-weight="500" fill="white"> Pay</text></svg>
      <svg class="payment-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mastercard"><rect width="38" height="24" rx="4" fill="white" stroke="#e0e0e0" stroke-width="1"/><circle cx="15" cy="12" r="7" fill="#EB001B"/><circle cx="23" cy="12" r="7" fill="#F79E1B"/><path d="M19 6.8a7 7 0 0 1 0 10.4A7 7 0 0 1 19 6.8z" fill="#FF5F00"/></svg>
      <svg class="payment-icon" viewBox="0 0 38 24" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Visa"><rect width="38" height="24" rx="4" fill="white" stroke="#e0e0e0" stroke-width="1"/><text x="19" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1F71" letter-spacing="1" font-style="italic">VISA</text></svg>
      <!-- ...add/remove processor icons as needed for the client's checkout -->
    </div>

    <!-- Copyright / legal -->
    <div class="footer-legal">
      &copy; 2026 [Client Business Name]. All rights reserved.<br>
      [Street Address], [City, State ZIP]
    </div>

  </div>
</footer>
